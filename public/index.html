<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="AlphaNineMarketing — premium digital marketing, AI automation, ads, content, and web design for brands that want to scale."
    />
    <!-- Performance: DNS + connection to font hosts before first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <!-- Suggested fonts: DM Sans (UI), Instrument Serif (display accents), Michroma (brand wordmark) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Michroma&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Michroma&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Michroma&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <!-- SEO meta title suggestions (swap per route in React or use react-helmet in production):
         - Home: "AlphaNineMarketing | AI-Powered Digital Marketing Agency"
         - Services: "Services | Ads, AI, Content & Web | AlphaNineMarketing"
         - About: "About Us | Mission & Vision | AlphaNineMarketing"
         - Team: "Team | AlphaNineMarketing"
         - Contact: "Contact | AlphaNineMarketing" -->
    <title>AlphaNineMarketing | Premium Digital Marketing Agency</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
